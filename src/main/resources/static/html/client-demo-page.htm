<!DOCTYPE html>
<html lang="no">
<head>
    <title>Client</title>
    <meta charset="UTF-8">

    <style>
        body { font-family: Arial, Helvetica, sans-serif; margin: 20px; }
        input{ line-height: 1.6em; }
        table { border-collapse: collapse;  }
        table, th, td { border: 1px solid #ccc; padding: 8px; text-align:left; }
        th { background: #f0f0f0; }
        *{line-height: 1.4em;}
    </style>

    <!-- REQUIRED PART OF SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <script>
        /**
         * snippet from chatGPT to run javascript from loaded html content
         */

        async function injectHtmlLikePage(container, html) {
            const tmp = document.createElement("div");
            tmp.style.display = "none";
            tmp.innerHTML = html;

            const elReviewList = tmp.querySelector(".review--list");
            if(!elReviewList) throw new Error("review list element on find");

            // uncomment to simulate data-enabled-listing="false"
            //elReviewList.setAttribute("data-enable-listing", "false");

            // check if listing is enabled
            const isListingEnabled = (elReviewList.getAttribute("data-enable-listing") !== "false");

            if(!isListingEnabled){
                console.log("early rejection or review listing, cause: enable-listing = false")
                return;
            }

            // 1. stylesheets
            tmp.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                const href = link.href;
                if (!document.querySelector(`link[href="${href}"]`)) {
                    const l = document.createElement("link");
                    l.rel = "stylesheet";
                    l.href = href;
                    document.head.appendChild(l);
                }
            });

            // inject HTML
            container.innerHTML = tmp.innerHTML;
            container.style.display = "none";

            // 2. inline styles
            tmp.querySelectorAll("style").forEach(style => {
                const s = document.createElement("style");
                s.textContent = style.textContent;
                document.head.appendChild(s);
            });

            // 3. extract scripts
            const scripts = Array.from(tmp.querySelectorAll("script"));
            scripts.forEach(s => s.remove());

            // 4. run scripts in order
            for (const s of scripts) {
                if (s.src) {
                    await new Promise((resolve, reject) => {
                        const script = document.createElement("script");
                        script.src = s.src;
                        script.onload = resolve;
                        script.onerror = reject;
                        document.head.appendChild(script);
                    });
                } else {
                    // execute inline script in global scope
                    //(0, eval)(s.textContent);
                    const script = document.createElement("script");
                    script.textContent = s.textContent;
                    document.head.appendChild(script).remove();
                }
            }

            container.style.display = "";
            tmp.style.display = "";
        }

        // usage, our code
        document.addEventListener("DOMContentLoaded", async () => {
            const article = encodeURIComponent("/product/1");
            const url = "/api/reviews/list/html?realApi=true&externalId=" + article;

            const res = await fetch(url);
            const html = await res.text();

            await injectHtmlLikePage(document.getElementById("omtaler"), html);

            console.log("all scripts + css loaded");
        });
    </script>
</head>
<body>
    <h1>Eksempel på implementasjon, dynamisk rute</h1>

    <div id="omtaler">
    </div>
</body>
</html>
